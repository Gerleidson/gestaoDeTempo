<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestão de Tempo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<link rel="stylesheet" href="css/styles.css" />
<link rel="icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="ti ti-clock-bolt"></i></div>
      <div class="auth-brand">Gestão de Tempo</div>
      <div class="auth-tagline">Gestão inteligente do seu tempo</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Criar conta</button>
    </div>
    <div class="auth-panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" id="login-email" type="email" placeholder="seu@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn-primary" onclick="doLogin()"><i class="ti ti-arrow-right"></i> Entrar</button>
    </div>
    <div class="auth-panel" id="panel-register">
      <div class="form-group">
        <label class="form-label">Nome completo</label>
        <input class="form-input" id="reg-name" type="text" placeholder="Seu nome" />
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-input" id="reg-email" type="email" placeholder="seu@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="reg-pass" type="password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar senha</label>
        <input class="form-input" id="reg-pass2" type="password" placeholder="Repita a senha" onkeydown="if(event.key==='Enter')doRegister()" />
      </div>
      <button class="btn-primary" onclick="doRegister()"><i class="ti ti-user-plus"></i> Criar conta</button>
    </div>
    <div class="auth-divider"><span>ou entre com demo</span></div>
    <button class="btn-secondary" style="width:100%;justify-content:center;display:flex;gap:8px;" onclick="doDemo()">
      <i class="ti ti-sparkles"></i> Entrar como convidado
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon"><i class="ti ti-clock-bolt"></i></div>
          <div class="logo-text">Gestão de Tempo</div>
        </div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-label">Visualização</div>
        <button class="nav-btn active" onclick="setView('cronograma')" id="nav-cronograma">
          <i class="ti ti-clock"></i> Cronograma
        </button>
        <div class="nav-label" style="margin-top:20px;">Áreas da vida</div>
        <div id="area-chips"></div>
      </div>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Usuário</div>
          <div class="user-role">Gestão Pessoal</div>
        </div>
        <button class="btn-logout" onclick="doLogout()" title="Sair"><i class="ti ti-logout"></i></button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <div class="main-inner">

        <div class="page-header">
          <div>
            <div class="page-title" id="page-title">Cronograma</div>
            <div class="page-subtitle" id="page-subtitle">—</div>
          </div>
          <div class="date-badge">
            <i class="ti ti-clock" style="font-size:15px;"></i>
            <span id="live-time">--:--</span>
          </div>
        </div>

        <!-- VIEW: Cronograma com abas de dias -->
        <div class="view active" id="view-cronograma">
          <div class="section">
            <div class="section-head">
              <span class="section-title">Distribuição do dia</span>
              <button class="btn-add" style="padding:7px 14px;font-size:12px;" onclick="openAddSchedule()">
                <i class="ti ti-plus"></i> Novo bloco
              </button>
            </div>

            <!-- Layout com abas horizontais -->
            <div class="weekly-tabs-layout">

              <!-- Barra de dias horizontal -->
              <div class="day-tabs-bar">
                <button class="day-tab-btn" id="ctab-dom" onclick="selectCronDay('dom')"><span class="day-tab-short">Dom</span></button>
                <button class="day-tab-btn" id="ctab-seg" onclick="selectCronDay('seg')"><span class="day-tab-short">Seg</span></button>
                <button class="day-tab-btn" id="ctab-ter" onclick="selectCronDay('ter')"><span class="day-tab-short">Ter</span></button>
                <button class="day-tab-btn" id="ctab-qua" onclick="selectCronDay('qua')"><span class="day-tab-short">Qua</span></button>
                <button class="day-tab-btn" id="ctab-qui" onclick="selectCronDay('qui')"><span class="day-tab-short">Qui</span></button>
                <button class="day-tab-btn" id="ctab-sex" onclick="selectCronDay('sex')"><span class="day-tab-short">Sex</span></button>
                <button class="day-tab-btn" id="ctab-sab" onclick="selectCronDay('sab')"><span class="day-tab-short">Sáb</span></button>
              </div>

              <!-- Conteúdo do dia -->
              <div class="day-tab-content">
                <div class="day-tab-header">
                  <div class="day-tab-title" id="cron-day-title">—</div>
                </div>
                <div class="schedule" id="schedule"></div>
              </div>

            </div>
          </div>
        </div>

      </div>

      <footer>
        <div class="footer-brand">
          <i class="ti ti-clock-bolt" style="color:var(--accent);"></i>
          <span>Gestão de Tempo</span> · Desenvolvido por Gerleidson
        </div>
        <div class="footer-copy">© 2025 Gestão de Tempo · v1.0</div>
      </footer>
    </div>
  </div>
</div>

<!-- MODAL EDITAR / NOVO BLOCO -->
<div class="modal-overlay" id="modal-sched">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-sched-heading">Novo bloco</span>
      <button class="modal-close" onclick="closeModal('modal-sched')"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-group-dark">
      <label class="form-label-dark">Horário</label>
      <input class="form-input-dark" id="ms-time" type="time" />
    </div>
    <div class="form-row">
      <div class="form-group-dark">
        <label class="form-label-dark">Título</label>
        <input class="form-input-dark" id="ms-title" placeholder="Ex: Foco profundo" />
      </div>
      <div class="form-group-dark">
        <label class="form-label-dark">Duração</label>
        <input class="form-input-dark" id="ms-dur" placeholder="Ex: 90 min" />
      </div>
    </div>
    <div class="form-group-dark">
      <label class="form-label-dark">Área</label>
      <select class="form-input-dark" id="ms-area"></select>
    </div>
    <div class="form-group-dark">
      <label class="form-label-dark">Descrição</label>
      <textarea class="form-input-dark form-textarea" id="ms-desc" placeholder="Descrição do bloco..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-sched')">Cancelar</button>
      <button class="btn-confirm" onclick="saveScheduleBlock()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<script type="module" src="js/app.js"></script>
</body>
</html>
